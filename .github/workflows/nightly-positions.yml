name: Nightly Roster Position Capture

on:
  schedule:
    # Run at 11pm ET (03:00 UTC next day) every day during MLB season.
    # All lineups are locked by this time, so positions reflect
    # the actual game-day roster (not next-morning changes).
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Write Yahoo token
        run: echo '${{ secrets.YAHOO_TOKEN_JSON }}' > .yahoo-token.json

      - name: Write .env
        run: |
          echo "YAHOO_CLIENT_ID=${{ secrets.YAHOO_CLIENT_ID }}" >> .env
          echo "YAHOO_CLIENT_SECRET=${{ secrets.YAHOO_CLIENT_SECRET }}" >> .env
          echo "YAHOO_MLB_LEAGUE_ID=${{ secrets.YAHOO_MLB_LEAGUE_ID }}" >> .env

      - name: Capture roster positions
        run: node daily-positions.js

      - name: Update Yahoo token secret if refreshed
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -f .yahoo-token.json ]; then
            gh secret set YAHOO_TOKEN_JSON < .yahoo-token.json
            echo "Updated YAHOO_TOKEN_JSON secret"
          fi

      - name: Commit position data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Nightly positions: $(TZ=America/New_York date +%Y-%m-%d)"
            git push
          fi
