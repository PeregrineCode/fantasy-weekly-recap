name: Daily Stats Collection

on:
  schedule:
    # Run at 7am ET (11:00 UTC) every day during MLB season.
    # Collects finalized stats for yesterday (all games end by ~2 AM).
    # Merges positions from the nightly capture (11 PM) for accurate bench detection.
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Write Yahoo token
        run: echo '${{ secrets.YAHOO_TOKEN_JSON }}' > .yahoo-token.json

      - name: Write .env
        run: |
          echo "YAHOO_CLIENT_ID=${{ secrets.YAHOO_CLIENT_ID }}" >> .env
          echo "YAHOO_CLIENT_SECRET=${{ secrets.YAHOO_CLIENT_SECRET }}" >> .env
          echo "YAHOO_MLB_LEAGUE_ID=${{ secrets.YAHOO_MLB_LEAGUE_ID }}" >> .env

      - name: Run daily collect
        run: node daily-collect.js

      - name: Update Yahoo token secret if refreshed
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -f .yahoo-token.json ]; then
            gh secret set YAHOO_TOKEN_JSON < .yahoo-token.json
            echo "Updated YAHOO_TOKEN_JSON secret"
          fi

      - name: Commit snapshot data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily collect: $(date -u +%Y-%m-%d)"
            git push
          fi
